<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lantern Sprint</title>
    <style>
        :root {
            --bg-color: #fdfbf7; /* Cream */
            --primary-red: #d32f2f; /* Lacquer Red */
            --primary-gold: #ffc107; /* Gold */
            --accent-gold: #ffeb3b; /* Bright Gold */
            --text-color: #3e2723;
            --cloud-color: #546e7a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 800px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: linear-gradient(to bottom, #fffdf5, #f0efe9);
            border: 2px solid var(--text-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-red);
            text-shadow: 1px 1px 0px var(--primary-gold);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 251, 247, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 48px;
            color: var(--primary-red);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #5d4037;
        }

        button {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b71c1c;
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b71c1c;
        }

        button:hover {
            background-color: #e53935;
        }

        .stat-value {
            color: var(--primary-gold);
            text-shadow: 1px 1px 0 #3e2723;
        }

        /* Decoration lines */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 4px solid var(--primary-red);
            pointer-events: none;
        }
        .tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    </style>
</head>
<body>

    <div id="game-container">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer">
            <div class="hud">
                <div id="scoreDisplay">Score: 0</div>
                <div id="timeDisplay">Time: 30</div>
            </div>
        </div>

        <div id="startScreen" class="screen">
            <h1>Lantern Sprint</h1>
            <p>Catch the glowing lanterns.<br>Avoid the rain clouds.<br>Use Arrow Keys or Touch sides.</p>
            <button id="startBtn">Start Run</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h1>Time Up!</h1>
            <p>Final Score: <span id="finalScore" class="stat-value">0</span></p>
            <button id="restartBtn">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        let gameRunning = false;
        let score = 0;
        let timeLeft = 30;
        let lastTime = 0;
        let spawnTimer = 0;
        let difficulty = 1;

        // Game Objects
        const player = {
            x: 0, y: 0, width: 50, height: 70, speed: 0, targetX: 0, color: '#d32f2f'
        };
        let items = []; // Lanterns and Clouds
        let particles = [];

        // Input State
        const keys = { ArrowLeft: false, ArrowRight: false };

        // Setup Canvas Size
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            player.y = canvas.height - 100;
            if (!gameRunning) {
                player.x = canvas.width / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Handling
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        // Touch Support
        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);
        canvas.addEventListener('touchend', () => {
            player.targetX = player.x;
        });

        function handleTouch(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            player.targetX = touchX;
        }

        // Start / Restart
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function startGame() {
            gameRunning = true;
            score = 0;
            timeLeft = 30;
            items = [];
            particles = [];
            difficulty = 1;
            player.x = canvas.width / 2;
            player.targetX = player.x;
            scoreDisplay.textContent = `Score: 0`;
            timeDisplay.textContent = `Time: 30`;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            // Start Timer
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                timeDisplay.textContent = `Time: ${timeLeft}`;
                difficulty = 1 + (30 - timeLeft) * 0.05;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        function spawnItem() {
            const isCloud = Math.random() > 0.7; // 30% chance for cloud
            const size = isCloud ? 60 : 40;
            const x = Math.random() * (canvas.width - size);
            items.push({
                x: x,
                y: -50,
                width: size,
                height: size,
                speed: (Math.random() * 3 + 2) * difficulty,
                type: isCloud ? 'cloud' : 'lantern',
                angle: 0
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function drawPlayer() {
            // Smooth movement towards target
            player.x += (player.targetX - player.x) * 0.2;

            // Clamp
            if (player.x < player.width/2) player.x = player.width/2;
            if (player.x > canvas.width - player.width/2) player.x = canvas.width - player.width/2;

            ctx.save();
            ctx.translate(player.x, player.y);

            // Handle keyboard override
            if (keys.ArrowLeft) player.targetX -= 8;
            if (keys.ArrowRight) player.targetX += 8;

            // Stick
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(-2, -10, 4, 20);

            // Body (Lantern shape)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, 20, 30, 0, 0, Math.PI * 2);
            ctx.fill();

            // Shine
            ctx.fillStyle = '#ffeb3b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 12, 20, 0, 0, Math.PI * 2);
            ctx.fill();

            // Glow
            ctx.shadowColor = '#ffeb3b';
            ctx.shadowBlur = 20;
            ctx.fillStyle = 'rgba(255, 235, 59, 0.5)';
            ctx.beginPath();
            ctx.ellipse(0, 0, 15, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawItems() {
            items.forEach((item, index) => {
                ctx.save();
                ctx.translate(item.x + item.width/2, item.y + item.height/2);

                if (item.type === 'lantern') {
                    // Draw Lantern
                    item.angle += 0.05;
                    ctx.rotate(Math.sin(item.angle) * 0.2);

                    // Rope
                    ctx.strokeStyle = '#5d4037';
                    ctx.beginPath();
                    ctx.moveTo(0, -item.height/2 - 10);
                    ctx.lineTo(0, -item.height/2);
                    ctx.stroke();

                    // Red Shell
                    ctx.fillStyle = '#d32f2f';
                    ctx.beginPath();
                    ctx.rect(-15, -20, 30, 40);
                    ctx.fill();

                    // Gold Caps
                    ctx.fillStyle = '#ffb300';
                    ctx.fillRect(-15, -20, 30, 5);
                    ctx.fillRect(-15, 15, 30, 5);

                    // Inner Glow
                    ctx.shadowColor = '#ffeb3b';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(-10, -15, 20, 30);

                } else {
                    // Draw Cloud
                    ctx.fillStyle = '#78909c';
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, 0, Math.PI*2);
                    ctx.arc(-20, 5, 20, 0, Math.PI*2);
                    ctx.arc(20, 5, 20, 0, Math.PI*2);
                    ctx.fill();

                    // Darker underbelly
                    ctx.fillStyle = '#455a64';
                    ctx.beginPath();
                    ctx.arc(0, 5, 25, 0, Math.PI, true);
                    ctx.fill();
                }
                ctx.restore();
            });
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI*2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;
        }

        function update(dt) {
            // Spawning
            spawnTimer += dt;
            if (spawnTimer > (1000 / difficulty)) {
                spawnItem();
                spawnTimer = 0;
            }

            // Item Physics
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                // Collision
                const dx = (player.x) - (item.x + item.width/2);
                const dy = (player.y) - (item.y + item.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 45) { // Hit
                    if (item.type === 'lantern') {
                        score += 10;
                        scoreDisplay.textContent = `Score: ${score}`;
                        createParticles(player.x, player.y, '#ffeb3b');
                    } else {
                        score -= 20;
                        scoreDisplay.textContent = `Score: ${score}`;
                        createParticles(player.x, player.y, '#546e7a');
                        // Visual shake or flash could go here
                    }
                    items.splice(i, 1);
                    continue;
                }

                // Remove off screen
                if (item.y > canvas.height + 50) {
                    items.splice(i, 1);
                }
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            update(dt);
            drawItems();
            drawPlayer();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
